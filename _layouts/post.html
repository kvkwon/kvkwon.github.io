---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>

  <p>
    By: {{ page.author }}<br>
    {% if page.tags %}
      Tags:
      {% for tag in page.tags %}
        <span>{{ tag }}</span>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    {% endif %}
  </p>

  {{ content }}
</article>
